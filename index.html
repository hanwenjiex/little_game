<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>痛扁强强</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      overflow: hidden;
      touch-action: none;
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, #1a1a3a 0%, #0a0a14 60%, #12121f 100%);
    }
    .floor {
      position: absolute;
      bottom: 70px;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4a4a6a, transparent);
    }
    .floor::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0a0a14 100%);
    }

    /* 角色 */
    .fighter {
      position: absolute;
      bottom: 74px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: left 0.06s, bottom 0.15s;
    }
    .sprite {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    }
    .sprite.mirror { transform: scaleX(-1); }
    .hp-bar {
      width: 80px;
      height: 8px;
      background: #222;
      border-radius: 4px;
      margin-bottom: 4px;
      overflow: hidden;
      border: 1px solid #333;
    }
    .hp-fill {
      height: 100%;
      transition: width 0.15s;
      border-radius: 4px;
    }
    .hp-fill.player {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }
    .hp-fill.enemy {
      background: linear-gradient(90deg, #ef4444, #f87171);
    }
    .hp-fill.boss {
      background: linear-gradient(90deg, #a855f7, #c084fc);
    }
    .name {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      margin-bottom: 2px;
      text-shadow: 1px 2px 3px #000;
    }
    .name.boss { color: #f87171; font-weight: 700; }

    /* 受伤闪烁 */
    .fighter.hurt {
      animation: hurtShake 0.2s;
      filter: brightness(2) saturate(0.5);
    }
    @keyframes hurtShake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* 攻击前摇 */
    .fighter.attack-windup .sprite {
      animation: windup 0.15s ease-out forwards;
    }
    @keyframes windup {
      to { transform: scale(1.2) translateX(10px); }
    }
    .fighter.attack-windup.mirror .sprite {
      animation: windupMirror 0.15s ease-out forwards;
    }
    @keyframes windupMirror {
      to { transform: scale(1.2) translateX(-10px) scaleX(-1); }
    }

    .fighter.attacking .sprite {
      animation: attackSwing 0.2s ease-out forwards;
    }
    .fighter.attacking.mirror .sprite {
      animation: attackSwingMirror 0.2s ease-out forwards;
    }
    @keyframes attackSwing {
      to { transform: scale(1.3) translateX(25px); }
    }
    @keyframes attackSwingMirror {
      to { transform: scale(1.3) translateX(-25px) scaleX(-1); }
    }

    /* 击飞效果 */
    .fighter.launched {
      animation: launched 0.4s ease-out forwards;
    }
    @keyframes launched {
      0% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(-40px) rotate(15deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* 特效 */
    .hit-effect {
      position: absolute;
      font-size: 36px;
      pointer-events: none;
      animation: hitPop 0.4s forwards;
      z-index: 50;
    }
    @keyframes hitPop {
      0% { transform: scale(0.3) translateY(0) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.4) translateY(-30px) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) translateY(-50px) rotate(0deg); opacity: 0; }
    }
    .damage-num {
      position: absolute;
      font-size: 26px;
      font-weight: 900;
      color: #ffd93d;
      pointer-events: none;
      animation: damageFly 0.7s forwards;
      z-index: 50;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    }
    .damage-num.big { font-size: 36px; color: #ff4757; }
    @keyframes damageFly {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      30% { transform: translateY(-30px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-80px) scale(0.7); opacity: 0; }
    }
    .star-effect {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      animation: starSpin 0.5s forwards;
      z-index: 49;
    }
    @keyframes starSpin {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
      100% { transform: scale(0) rotate(360deg); opacity: 0; }
    }

    /* 屏幕效果 */
    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255,71,87,0.25);
      pointer-events: none;
      z-index: 150;
      animation: flashAnim 0.12s forwards;
    }
    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    .ko-text {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 90px;
      font-weight: 900;
      color: #ff2d2d;
      text-shadow: 0 0 40px rgba(255,45,45,0.9), 5px 5px 0 #7f0000, -2px -2px 0 #ff6b6b;
      z-index: 200;
      animation: koPop 1.2s forwards;
      letter-spacing: 10px;
    }
    @keyframes koPop {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.4) rotate(5deg); opacity: 1; }
      40% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.5) rotate(5deg); opacity: 0; }
    }
    .wave-banner {
      position: fixed;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      font-weight: 900;
      color: #ffd93d;
      text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,217,61,0.5);
      z-index: 200;
      animation: waveIn 2s forwards;
      letter-spacing: 6px;
    }
    @keyframes waveIn {
      0% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      75% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    }

    /* 控制按钮 */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 14px 20px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.7));
      z-index: 100;
    }
    .ctrl-group { display: flex; gap: 8px; align-items: center; }
    .move-btns { display: flex; gap: 8px; align-items: center; }
    .ctrl-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(6px);
      transition: transform 0.08s, background 0.08s;
    }
    .ctrl-btn:active {
      transform: scale(0.85);
      background: rgba(255,255,255,0.25);
    }
    .ctrl-btn.attack {
      background: rgba(239,68,68,0.25);
      border-color: #ef4444;
      width: 68px; height: 68px;
      font-size: 30px;
    }
    .ctrl-btn.attack:active { background: rgba(239,68,68,0.5); }
    .ctrl-btn.special {
      background: rgba(168,85,247,0.25);
      border-color: #a855f7;
      width: 68px; height: 68px;
      font-size: 30px;
    }
    .ctrl-btn.special:active { background: rgba(168,85,247,0.5); }
    .ctrl-btn.jump-btn {
      width: 50px; height: 50px;
      font-size: 20px;
    }

    /* 状态栏 */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }
    #wave-info {
      font-size: 15px;
      font-weight: 700;
      color: #ffd93d;
      text-shadow: 1px 1px 3px #000;
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 20px;
    }
    #combo {
      font-size: 22px;
      font-weight: 900;
      color: #ff4757;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      text-shadow: 2px 2px 0 #000;
      transform: scale(0.8);
    }
    #combo.show {
      opacity: 1;
      transform: scale(1);
      animation: comboPulse 0.3s ease-out;
    }
    @keyframes comboPulse {
      0% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    #score-display {
      font-size: 15px;
      color: #aaa;
      text-shadow: 1px 1px 3px #000;
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* 界面 */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,20,0.97);
      z-index: 300;
      color: #fff;
      gap: 14px;
    }
    .screen.hidden { display: none; }
    h1 {
      font-size: 52px;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ff4757, #ffd93d, #ff8e53);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    .final-score { font-size: 72px; font-weight: 800; color: #ffd93d; text-shadow: 0 0 30px rgba(255,217,61,0.5); }
    .btn {
      padding: 16px 52px;
      font-size: 22px;
      font-weight: 800;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4757, #ff8e53);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255,71,87,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: scale(0.93); }
    .desc { color: #777; font-size: 15px; text-align: center; max-width: 300px; line-height: 1.7; }
    .result-text { font-size: 22px; color: #aaa; }
    .win-text { color: #4ade80; }
    .lose-text { color: #ef4444; }

    /* 敌人头像 */
    #enemyImg {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="bg"></div>
    <div class="floor"></div>

    <!-- 玩家 -->
    <div id="player" class="fighter" style="left:70px;">
      <div class="name">你</div>
      <div class="hp-bar"><div class="hp-fill player" id="playerHp" style="width:100%"></div></div>
      <div class="sprite" id="playerSprite">👊</div>
    </div>

    <!-- 强强 -->
    <div id="enemy" class="fighter" style="left:240px;">
      <div class="name" id="enemyName">强强</div>
      <div class="hp-bar"><div class="hp-fill enemy" id="enemyHp" style="width:100%"></div></div>
      <img id="enemyImg" src="qiangqiang.png"left:240px;" crossorigin="anonymous">
    </div>
  </div>

  <div id="ui">
    <div id="wave-info">第 1 波</div>
    <div id="combo"></div>
    <div id="score-display">0分</div>
  </div>

  <div id="controls">
    <div class="move-btns">
      <button class="ctrl-btn" ontouchstart="moveLeft()" onmousedown="moveLeft()" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchend="stopMove()">◀</button>
      <button class="ctrl-btn" ontouchstart="jump()" onmousedown="jump()">⬆</button>
      <button class="ctrl-btn" ontouchstart="moveRight()" onmousedown="moveRight()" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchend="stopMove()">▶</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn attack" ontouchstart="attack()" onmousedown="attack()">👊</button>
      <button class="ctrl-btn special" ontouchstart="special()" onmousedown="special()">💥</button>
    </div>
  </div>

  <div id="startScreen" class="screen">
    <h1>痛扁强强</h1>
    <p class="desc">痛扁小朋友风格！<br>用连击打倒强强！<br>◀▶移动 &nbsp;⬆跳跃&nbsp;👊攻击&nbsp;💥大招</p>
    <button class="btn" onclick="startGame()">开始战斗</button>
  </div>

  <div id="endScreen" class="screen hidden">
    <h1 id="endTitle">K.O.</h1>
    <p id="endResult" class="result-text"></p>
    <div id="finalScore" class="final-score">0</div>
    <button class="btn" onclick="startGame()">再来一次</button>
  </div>

  <script>
    const game = document.getElementById('game');
    const playerEl = document.getElementById('player');
    const enemyEl = document.getElementById('enemy');
    const playerHpEl = document.getElementById('playerHp');
    const enemyHpEl = document.getElementById('enemyHp');
    const waveInfoEl = document.getElementById('wave-info');
    const comboEl = document.getElementById('combo');
    const scoreEl = document.getElementById('score-display');
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');
    const endResult = document.getElementById('endResult');
    const finalScoreEl = document.getElementById('finalScore');
    const enemyNameEl = document.getElementById('enemyName');
    const playerSprite = document.getElementById('playerSprite');

    let playerX = 70, enemyX = 240;
    let playerHP = 100, enemyHP = 100;
    let wave = 1, score = 0, combo = 0, comboTimer = null;
    let gameActive = false, canAttack = true;
    let moving = false, moveDir = 0;
    let playerJumping = false;

    const ENEMY_NAMES = ['小强强', '中强强', '强强王', 'BOSS强强'];

    function startGame() {
      playerHP = 100; enemyHP = 100; wave = 1; score = 0; combo = 0;
      playerX = 70; enemyX = 240;
      canAttack = true;
      updateHP();
      playerEl.style.left = playerX + 'px';
      enemyEl.style.left = enemyX + 'px';
      enemyNameEl.textContent = '小强强';
      enemyNameEl.className = 'name';
      enemyHpEl.className = 'hp-fill enemy';
      enemyEl.className = 'fighter';
      playerEl.className = 'fighter';
      startScreen.classList.add('hidden');
      endScreen.classList.add('hidden');
      gameActive = true;
      showWave();
      setTimeout(() => enemyAI(), 2500);
    }

    function showWave() {
      const b = document.createElement('div');
      b.className = 'wave-banner';
      b.textContent = wave === 4 ? 'BOSS战!' : `第 ${wave} 波`;
      game.appendChild(b);
      setTimeout(() => b.remove(), 2000);
      waveInfoEl.textContent = wave === 4 ? 'BOSS战!' : `第 ${wave} 波`;
    }

    function updateHP() {
      playerHpEl.style.width = Math.max(0, playerHP) + '%';
      enemyHpEl.style.width = Math.max(0, enemyHP) + '%';
    }

    function moveLeft() {
      if (!gameActive) return;
      moveDir = -1; moving = true;
      playerSprite.textContent = '👈';
      const loop = () => {
        if (!moving || !gameActive) return;
        playerX = Math.max(10, playerX - 5);
        playerEl.style.left = playerX + 'px';
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }
    function moveRight() {
      if (!gameActive) return;
      moveDir = 1; moving = true;
      playerSprite.textContent = '👉';
      const loop = () => {
        if (!moving || !gameActive) return;
        playerX = Math.min(window.innerWidth - 90, playerX + 5);
        playerEl.style.left = playerX + 'px';
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }
    function stopMove() {
      moving = false;
      playerSprite.textContent = '👊';
    }

    function jump() {
      if (!gameActive || playerJumping) return;
      playerJumping = true;
      playerEl.style.bottom = (74 + 70) + 'px';
      setTimeout(() => {
        playerEl.style.bottom = '74px';
        playerJumping = false;
      }, 300);
    }

    function isInRange() {
      return Math.abs(playerX - enemyX) < 170;
    }

    function attack() {
      if (!gameActive || !canAttack) return;
      if (!isInRange()) return;

      canAttack = false;
      setTimeout(() => canAttack = true, 300);

      combo++;
      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => { combo = 0; comboEl.classList.remove('show'); }, 1500);

      // 前摇
      playerEl.classList.add('attack-windup');
      setTimeout(() => {
        playerEl.classList.remove('attack-windup');
        playerEl.classList.add('attacking');

        let dmg = 10 + Math.floor(Math.random() * 8);
        if (combo >= 3) { dmg = Math.floor(dmg * 1.5); comboEl.classList.add('show'); comboEl.textContent = combo + ' 连击!'; }
        if (combo >= 6) { dmg = Math.floor(dmg * 1.8); }
        if (combo >= 10) { dmg = Math.floor(dmg * 2.2); }

        enemyHP -= dmg;
        score += dmg;
        updateHP();
        scoreEl.textContent = score + '分';

        spawnHit('👊', enemyX + 45, window.innerHeight - 170);
        spawnDmg('-' + dmg, enemyX + 55, window.innerHeight - 190, dmg >= 25);

        enemyEl.classList.add('hurt');
        setTimeout(() => enemyEl.classList.remove('hurt'), 200);

        const knockback = dmg > 20 ? 25 : 12;
        enemyX = Math.min(window.innerWidth - 90, enemyX + knockback);
        enemyEl.style.left = enemyX + 'px';
        setTimeout(() => enemyEl.classList.remove('attacking'), 200);

        if (dmg >= 30) spawnStars(enemyX + 45, window.innerHeight - 180);
        if (enemyHP <= 0) nextWave();
      }, 150);
    }

    function special() {
      if (!gameActive || !canAttack) return;
      if (!isInRange()) return;

      canAttack = false;
      setTimeout(() => canAttack = true, 600);

      let dmg = 30 + Math.floor(Math.random() * 20);
      if (combo >= 5) dmg = Math.floor(dmg * 1.5);

      playerEl.classList.add('attack-windup');
      setTimeout(() => {
        playerEl.classList.remove('attack-windup');
        playerEl.classList.add('attacking');
        flashScreen();

        enemyHP -= dmg;
        score += dmg;
        updateHP();
        scoreEl.textContent = score + '分';

        spawnHit('💥', enemyX + 45, window.innerHeight - 170);
        spawnDmg('-' + dmg, enemyX + 55, window.innerHeight - 190, true);

        enemyEl.classList.add('hurt', 'launched');
        setTimeout(() => { enemyEl.classList.remove('hurt', 'launched'); }, 400);

        enemyX = Math.min(window.innerWidth - 90, enemyX + 40);
        enemyEl.style.left = enemyX + 'px';
        setTimeout(() => enemyEl.classList.remove('attacking'), 250);

        spawnStars(enemyX + 45, window.innerHeight - 180);
        spawnStars(enemyX + 60, window.innerHeight - 160);
        if (enemyHP <= 0) nextWave();
      }, 100);
    }

    function spawnHit(emoji, x, y) {
      const el = document.createElement('div');
      el.className = 'hit-effect';
      el.textContent = emoji;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      game.appendChild(el);
      setTimeout(() => el.remove(), 400);
    }

    function spawnDmg(text, x, y, big) {
      const el = document.createElement('div');
      el.className = 'damage-num' + (big ? ' big' : '');
      el.textContent = text;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      game.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function spawnStars(x, y) {
      for (let i = 0; i < 3; i++) {
        const el = document.createElement('div');
        el.className = 'star-effect';
        el.textContent = '⭐';
        el.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
        el.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
        game.appendChild(el);
        setTimeout(() => el.remove(), 500);
      }
    }

    function flashScreen() {
      const el = document.createElement('div');
      el.className = 'flash';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 120);
    }

    function nextWave() {
      gameActive = false;
      score += 500;
      combo = 0; comboEl.classList.remove('show');

      const ko = document.createElement('div');
      ko.className = 'ko-text';
      ko.textContent = 'K.O.';
      document.body.appendChild(ko);
      setTimeout(() => ko.remove(), 1200);

      setTimeout(() => {
        if (wave >= 4) { endGame(true); return; }
        wave++;
        enemyHP = 100;
        enemyX = 240;
        updateHP();
        enemyEl.style.left = enemyX + 'px';
        enemyNameEl.textContent = ENEMY_NAMES[wave - 1];
        if (wave === 4) { enemyNameEl.className = 'name boss'; enemyHpEl.className = 'hp-fill boss'; }
        else if (wave === 3) { enemyNameEl.className = 'name boss'; }

        gameActive = true;
        showWave();
        setTimeout(() => enemyAI(), 2500);
      }, 1500);
    }

    function enemyAI() {
      if (!gameActive || enemyHP <= 0 || playerHP <= 0) return;

      const action = Math.random();

      if (action < 0.45) {
        // 攻击玩家
        let dmg = 6 + wave * 4 + Math.floor(Math.random() * 6);
        if (wave === 4) dmg = Math.floor(dmg * 1.4);
        if (wave === 3) dmg = Math.floor(dmg * 1.2);

        playerHP -= dmg;
        updateHP();
        spawnHit('👊', playerX + 45, window.innerHeight - 170);
        spawnDmg('-' + dmg, playerX + 55, window.innerHeight - 190, false);

        playerEl.classList.add('hurt');
        setTimeout(() => playerEl.classList.remove('hurt'), 200);

        const knockback = dmg > 15 ? -20 : -10;
        playerX = Math.max(10, playerX + knockback);
        playerEl.style.left = playerX + 'px';

        if (playerHP <= 0) { endGame(false); return; }
        setTimeout(() => enemyAI(), 1000 + Math.random() * 800);

      } else if (action < 0.75) {
        // 追击玩家
        const dir = playerX < enemyX ? -1 : 1;
        const dist = Math.abs(playerX - enemyX);
        const moveAmount = dist > 100 ? 60 : 30;
        enemyX = Math.max(160, Math.min(window.innerWidth - 90, enemyX + dir * moveAmount));
        enemyEl.style.left = enemyX + 'px';
        setTimeout(() => enemyAI(), 700 + Math.random() * 500);

      } else if (action < 0.88) {
        // 后撤
        const dir = playerX < enemyX ? 1 : -1;
        enemyX = Math.max(160, Math.min(window.innerWidth - 90, enemyX + dir * 40));
        enemyEl.style.left = enemyX + 'px';
        setTimeout(() => enemyAI(), 600 + Math.random() * 600);

      } else {
        // 原地待机后再次行动
        setTimeout(() => enemyAI(), 500 + Math.random() * 700);
      }
    }

    function endGame(win) {
      gameActive = false;
      if (win) {
        score += 2000;
        endTitle.textContent = '胜利!';
        endTitle.style.webkitTextFillColor = '#4ade80';
        endResult.textContent = '你痛扁了强强!';
        endResult.className = 'result-text win-text';
        finalScoreEl.textContent = score;
      } else {
        endTitle.textContent = 'K.O.';
        endTitle.style.webkitTextFillColor = '#ff4757';
        endResult.textContent = '强强把你打趴了...';
        endResult.className = 'result-text lose-text';
        finalScoreEl.textContent = score;
      }
      endScreen.classList.remove('hidden');
    }
  </script>
</body>
</html>
